jobs:
  repro:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: priyagupta108/setup-python@pip-root-user-warning
        with:
          python-version: '3.13.7'

      - name: Show pip version
        run: python -m pip --version
