name: Setup Python Rate Limit Test

on:
  workflow_dispatch:

jobs:
  hit-rate-limit:
    runs-on: ubuntu-latest
    steps:
    - name: API Flood (Hit GitHub API rate limit)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        for i in {1..2000}; do
          curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/user > /dev/null
        done

    - name: Setup Python with GraalPy
      uses: actions/setup-python@v5
      with:
        python-version: graalpy-24.1

    - name: Show Python version
      run: python --version
