name: Test 1318

on:
  workflow_dispatch:
  push:

jobs:
  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest, ubuntu-24.04-arm, windows-11-arm]
        

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: priyagupta108/setup-python@pip-root-user-warning
        with:
          python-version: 3.13.10
       
  

      - name: Verify pip version
        run: pip --version

      - run: pip install -r requirements.txt    
